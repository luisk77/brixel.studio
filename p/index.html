<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Brixel Studio</title>
<style>
:root {
  --bg: #0A0A0A;
  --text: #FFFFFF;
  --muted: #666;
  --gold: #C9A84C;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter Tight', -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.container {
  text-align: center;
  max-width: 480px;
}
.mark {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 48px;
  color: var(--text);
}
.mark span { color: var(--gold); }
h1 {
  font-family: 'Syne', sans-serif;
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 24px;
  text-transform: uppercase;
  line-height: 0.9;
}
p {
  color: var(--muted);
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 32px;
}
a {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  text-decoration: none;
  border-bottom: 1px solid var(--gold);
  padding-bottom: 4px;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter+Tight:wght@300;400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <div class="mark">BRIXEL<span>.</span>STUDIO</div>
  <h1>Private<br>area.</h1>
  <p>This section contains client proposals accessible only via direct link. If you received a link to a proposal, please use it directly.</p>
  <a href="https://brixel.studio">← Back to home</a>
</div>
</body>
</html>
